name: Build And Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-update-manifests:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/airbnb-welcome-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/airbnb-welcome-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/airbnb-welcome-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/airbnb-welcome-frontend:${{ github.sha }}

      - name: Update Kubernetes image tags
        run: |
          sed -i "s|image: .*/airbnb-welcome-backend:.*|image: ${DOCKERHUB_USERNAME}/airbnb-welcome-backend:${IMAGE_TAG}|" k8s/backend-deployment.yaml
          sed -i "s|image: .*/airbnb-welcome-frontend:.*|image: ${DOCKERHUB_USERNAME}/airbnb-welcome-frontend:${IMAGE_TAG}|" k8s/frontend-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update image tags to ${IMAGE_TAG} [skip ci]"
          git push
