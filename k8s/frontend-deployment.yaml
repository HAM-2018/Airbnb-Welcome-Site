apiVersion: apps/v1
kind: Deployment
metadata:
  name: airbnb-frontend
  namespace: airbnb-welcome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airbnb-frontend
  template:
    metadata:
      labels:
        app: airbnb-frontend
    spec:
      containers:
        - name: frontend
          image: hadensmith/airbnb-welcome-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_INTERNAL_URL
              value: "http://airbnb-backend.airbnb-welcome.svc.cluster.local:8000"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "/api"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
