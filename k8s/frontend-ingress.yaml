apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airbnb-frontend-ingress
  namespace: airbnb-welcome
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: airbnb-frontend
                port:
                  number: 80
